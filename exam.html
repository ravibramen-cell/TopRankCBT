<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Top Rank CBT Exam</title>

<style>
.submit{
background:#2563eb;
color:white;
padding:12px 25px;
border:none;
border-radius:8px;
cursor:pointer;
margin-left:10px;
}
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}





body{
background:#f5f5f5;
}

.header{
height:60px;
background:#0f172a;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 20px;
}

.timer{
background:red;
padding:8px 15px;
border-radius:5px;
}

.container{
display:flex;
height:calc(100vh - 60px);
}

.left{
width:75%;
padding:20px;
background:white;
}

.right{
width:25%;
background:#e5e7eb;
padding:20px;
}

.question{
font-size:22px;
margin-bottom:20px;
}

.option{
padding:15px;
margin:10px 0;
background:#f8fafc;
border:2px solid #ddd;
border-radius:8px;
cursor:pointer;
}

.option:hover{
border-color:#22c55e;
}

.palette{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
}

.num{
height:40px;
display:flex;
justify-content:center;
align-items:center;
background:white;
border-radius:5px;
}

.buttons{
margin-top:25px;
display:flex;
justify-content:space-between;
}

button{

padding:12px 25px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;

}

.prev{
background:#6b7280;
color:white;
}

.next{
background:#22c55e;
color:white;
}

</style>

</head>
<script src="js/timer.js"></script>
<body>

<div class="header">

<h2>Top Rank CBT</h2>

<div class="timer" id="timer">
60:00
</div>

</div>

<div class="container">

<div class="left">

<div class="question">

Q1. She looked at ____ in the mirror.

</div>

<div class="option">A. her</div>

<div class="option">B. herself</div>

<div class="option">C. hers</div>

<div class="option">D. herself's</div>

<div class="buttons">

<button class="prev">
Previous
</button>

<button class="next">
Next
</button>.  
  
  <button onclick="submitExam()" class="submit">
Submit Exam
</button>

</div>

</div>

<div class="right">

<h3>Question Palette</h3>

<br>

<div class="palette">

<div class="num">1</div>
<div class="num">2</div>
<div class="num">3</div>
<div class="num">4</div>
<div class="num">5</div>
<div class="num">6</div>
<div class="num">7</div>
<div class="num">8</div>
<div class="num">9</div>
<div class="num">10</div>

</div>

</div>

</div>
<script src="js/questions.js"></script>
<script src="js/exam.js"></script>
<script src="js/timer.js"></script>
</body>
</html>
