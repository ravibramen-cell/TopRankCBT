<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Rank CBT</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#0f172a;
            color:white;
        }

        header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:18px;
            background:#111827;
        }

        .logo{
            font-size:28px;
            font-weight:bold;
            color:#22c55e;
        }

        nav a{
            color:white;
            margin-left:20px;
            text-decoration:none;
        }

        .hero{
            text-align:center;
            padding:70px 20px;
        }

        .hero h1{
            font-size:38px;
        }

        .hero p{
            margin-top:15px;
            color:#cbd5e1;
        }

        button{
            margin-top:30px;
            padding:15px 35px;
            border:none;
            border-radius:10px;
            background:#22c55e;
            color:white;
            font-size:18px;
        }

        .cards{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
            gap:20px;
            padding:30px;
        }

        .card{
            background:#1e293b;
            padding:25px;
            border-radius:12px;
            text-align:center;
        }

        footer{
            padding:20px;
            text-align:center;
            color:#94a3b8;
        }
    </style>

</head>
<body>

<header>

<div class="logo">
Top Rank CBT
</div>

<nav>

<a href="#">Home</a>
<a href="#">Practice</a>
<a href="#">Mock Test</a>

</nav>

</header>

<section class="hero">

<h1>Welcome To Top Rank CBT</h1>

<p>AI Powered SSC Preparation Platform</p>

<button>
Start Mock Test
</button>

</section>

<section class="cards">

<div class="card">
<h2>SSC CGL</h2>
</div>

<div class="card">
<h2>SSC CHSL</h2>
</div>

<div class="card">
<h2>SSC MTS</h2>
</div>

<div class="card">
<h2>SSC GD</h2>
</div>

</section>

<footer>

© 2026 Top Rank CBT

</footer>

</body>
</html>
